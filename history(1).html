<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Earnova | Transaction History</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://kit.fontawesome.com/c03cee45d4.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="Js/firebase.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #06b6d4;
      --accent: #8b5cf6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #0f172a;
      --darker: #020617;
      --card: #1e293b;
      --card-hover: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      --gradient-success: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
      --gradient-warning: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--darker);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.15) 0px, transparent 50%);
      animation: bgPulse 15s ease infinite;
    }

    @keyframes bgPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .orbs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: orbFloat 20s infinite ease-in-out;
    }

    .orb-1 { width: 300px; height: 300px; background: var(--primary); top: -10%; left: -10%; }
    .orb-2 { width: 250px; height: 250px; background: var(--secondary); bottom: -10%; right: -10%; animation-delay: 5s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }

    .header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--primary);
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .icon-btn:hover {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--primary);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 100px 20px 140px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.success { color: var(--success); }
    .stat-value.pending { color: var(--warning); }

    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .filter-tab {
      padding: 10px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-tab:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .filter-tab.active {
      background: var(--gradient-1);
      border-color: transparent;
      color: white;
    }

    .date-header {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 24px 0 12px;
      padding-left: 8px;
    }

    .transaction-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .transaction-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s ease;
      cursor: pointer;
      animation: slideUp 0.4s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .transaction-item:hover {
      background: var(--card-hover);
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .transaction-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .transaction-icon.earning {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
    }

    .transaction-icon.withdrawal {
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
    }

    .transaction-icon.bonus {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
    }

    .transaction-icon.referral {
      background: rgba(139, 92, 246, 0.1);
      color: var(--accent);
    }

    .transaction-details {
      flex: 1;
      min-width: 0;
    }

    .transaction-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .transaction-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .transaction-dot {
      width: 4px;
      height: 4px;
      background: var(--text-muted);
      border-radius: 50%;
    }

    .transaction-amount {
      text-align: right;
      flex-shrink: 0;
    }

    .amount-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--success);
    }

    .amount-value.withdrawal {
      color: var(--text);
    }

    .amount-value.bonus {
      color: var(--warning);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      margin-top: 4px;
    }

    .status-badge.pending {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .status-badge.completed {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-badge.failed {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .status-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-badge.pending .status-dot { background: var(--warning); }
    .status-badge.completed .status-dot { background: var(--success); }
    .status-badge.failed .status-dot { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      background: var(--card);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
      color: var(--text-muted);
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 12px 24px 24px;
      display: flex;
      justify-content: space-around;
      z-index: 999;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.3s ease;
      padding: 8px 16px;
      border-radius: 12px;
    }

    .nav-item i {
      font-size: 20px;
      transition: all 0.3s ease;
    }

    .nav-item.active {
      color: var(--primary);
    }

    .nav-item.active i {
      transform: translateY(-4px);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      max-width: 400px;
      width: 100%;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .modal-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .modal-icon.earning { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .modal-icon.withdrawal { background: rgba(99, 102, 241, 0.1); color: var(--primary); }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
    }

    .modal-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .detail-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .modal-close {
      width: 100%;
      padding: 14px;
      background: var(--gradient-1);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--darker);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .container {
        padding: 90px 16px 140px;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .transaction-item {
        padding: 12px;
      }
      
      .transaction-icon {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading transactions...</div>
  </div>

  <div class="bg-animation"></div>
  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <header class="header">
    <a href="board.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div class="header-title">Transaction History</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="exportHistory()">
        <i class="fas fa-download"></i>
      </button>
      <button class="icon-btn" onclick="clearHistory()">
        <i class="fas fa-trash"></i>
      </button>
    </div>
  </header>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Earnings</div>
        <div class="stat-value success" id="totalEarnings">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Withdrawn</div>
        <div class="stat-value" id="totalWithdrawn">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value pending" id="pendingAmount">$0.00</div>
      </div>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterTransactions('all')">All</button>
      <button class="filter-tab" onclick="filterTransactions('earning')">Earnings</button>
      <button class="filter-tab" onclick="filterTransactions('withdrawal')">Withdrawals</button>
      <button class="filter-tab" onclick="filterTransactions('bonus')">Bonuses</button>
      <button class="filter-tab" onclick="filterTransactions('referral')">Referrals</button>
    </div>

    <div id="transactionContainer">
      <!-- Transactions injected by JS -->
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="board.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="board.html" class="nav-item">
      <i class="fas fa-tasks"></i>
      <span>Tasks</span>
    </a>
    <a href="history.html" class="nav-item active">
      <i class="fas fa-history"></i>
      <span>History</span>
    </a>
    <a href="board.html" class="nav-item">
      <i class="fas fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>

  <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-icon earning" id="modalIcon">
          <i class="fas fa-check-circle"></i>
        </div>
        <div>
          <div class="modal-title" id="modalTitle">Task Completed</div>
          <div class="modal-subtitle" id="modalDate">Today, 2:30 PM</div>
        </div>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Amount</span>
        <span class="detail-value" id="modalAmount" style="color: var(--success);">+$4.00</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value" id="modalStatus">Completed</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Transaction ID</span>
        <span class="detail-value" id="modalId">#TXN123456</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Description</span>
        <span class="detail-value" id="modalDesc">Facebook Page Engagement</span>
      </div>
      
      <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    // ==================== FIREBASE INTEGRATION ====================
    const db = firebase.firestore();
    let currentUser = null;
    let transactionsData = [];
    let txnListener = null;
    let currentFilter = 'all';

    function initApp() {
      firebase.auth().onAuthStateChanged(async (user) => {
        if (!user) {
          window.location.href = 'signin.html';
          return;
        }
        currentUser = user;
        startTransactionsListener();
      });
    }

    function startTransactionsListener() {
      if (txnListener) txnListener();

      txnListener = db.collection('users').doc(currentUser.uid)
        .collection('transactions')
        .orderBy('timestamp', 'desc')
        .onSnapshot((snapshot) => {
          transactionsData = [];
          snapshot.forEach((doc) => {
            const data = doc.data();
            transactionsData.push({
              id: doc.id,
              ...data,
              timestamp: data.timestamp ? (typeof data.timestamp.toDate === 'function' ? data.timestamp.toDate().getTime() : new Date(data.timestamp).getTime()) : Date.now()
            });
          });

          // Fallback to localStorage if Firestore is empty
          if (transactionsData.length === 0) {
            const localTxns = JSON.parse(localStorage.getItem('transactions')) || [];
            transactionsData = localTxns;
          }

          renderTransactions(currentFilter);
          updateStats();
          hideLoading();
        }, (error) => {
          console.error('Firestore error:', error);
          const localTxns = JSON.parse(localStorage.getItem('transactions')) || [];
          transactionsData = localTxns;
          renderTransactions(currentFilter);
          updateStats();
          hideLoading();
        });
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }

    function updateStats() {
      const totalEarnings = transactionsData
        .filter(t => t.type === 'earning' || t.type === 'bonus' || t.type === 'referral')
        .filter(t => t.status === 'completed')
        .reduce((sum, t) => sum + (parseFloat(t.amount) || 0), 0);
        
      const totalWithdrawn = transactionsData
        .filter(t => t.type === 'withdrawal')
        .filter(t => t.status === 'completed')
        .reduce((sum, t) => sum + Math.abs(parseFloat(t.amount) || 0), 0);
        
      const pending = transactionsData
        .filter(t => t.status === 'pending')
        .reduce((sum, t) => sum + (t.type === 'withdrawal' ? -Math.abs(parseFloat(t.amount) || 0) : (parseFloat(t.amount) || 0)), 0);

      document.getElementById('totalEarnings').textContent = '$' + totalEarnings.toFixed(2);
      document.getElementById('totalWithdrawn').textContent = '$' + totalWithdrawn.toFixed(2);
      document.getElementById('pendingAmount').textContent = '$' + Math.abs(pending).toFixed(2);
    }

    function renderTransactions(filter) {
      const container = document.getElementById('transactionContainer');
      let transactions = transactionsData;
      if (filter !== 'all') {
        transactions = transactions.filter(t => t.type === filter);
      }

      if (transactions.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-receipt"></i></div>
            <div class="empty-title">No transactions yet</div>
            <p>Complete tasks to start earning!</p>
          </div>`;
        return;
      }

      const grouped = groupByDate(transactions);
      let html = '';
      Object.keys(grouped).forEach(date => {
        html += `<div class="date-header">${date}</div><div class="transaction-list">`;
        grouped[date].forEach((txn, index) => {
          const iconClass = txn.type;
          const icon = getIcon(txn.type);
          const amountClass = txn.type === 'withdrawal' ? 'withdrawal' : txn.type === 'bonus' ? 'bonus' : '';
          const amountPrefix = txn.type === 'withdrawal' ? '-' : '+';
          const statusBadge = txn.status !== 'completed' ? 
            `<span class="status-badge ${txn.status}"><span class="status-dot"></span>${txn.status.charAt(0).toUpperCase() + txn.status.slice(1)}</span>` : '';
          
          html += `
            <div class="transaction-item" onclick="showDetail('${txn.id}')" style="animation-delay: ${index * 0.1}s">
              <div class="transaction-icon ${iconClass}"><i class="${icon}"></i></div>
              <div class="transaction-details">
                <div class="transaction-title">${txn.title}</div>
                <div class="transaction-meta">
                  <span>${formatTime(txn.date || txn.timestamp)}</span>
                  <span class="transaction-dot"></span>
                  <span>${txn.type.charAt(0).toUpperCase() + txn.type.slice(1)}</span>
                </div>
              </div>
              <div class="transaction-amount">
                <div class="amount-value ${amountClass}">${amountPrefix}$${Math.abs(parseFloat(txn.amount) || 0).toFixed(2)}</div>
                ${statusBadge}
              </div>
            </div>`;
        });
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    function groupByDate(transactions) {
      const grouped = {};
      transactions.forEach(txn => {
        const date = new Date(txn.date || txn.timestamp);
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        let dateStr;
        if (date.toDateString() === today.toDateString()) dateStr = 'Today';
        else if (date.toDateString() === yesterday.toDateString()) dateStr = 'Yesterday';
        else dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        
        if (!grouped[dateStr]) grouped[dateStr] = [];
        grouped[dateStr].push(txn);
      });
      return grouped;
    }

    function getIcon(type) {
      const icons = { earning: 'fas fa-check-circle', withdrawal: 'fas fa-arrow-down', bonus: 'fas fa-gift', referral: 'fas fa-users' };
      return icons[type] || 'fas fa-circle';
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    function filterTransactions(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.textContent.toLowerCase().includes(type) || (type === 'all' && tab.textContent === 'All')) {
          tab.classList.add('active');
        }
      });
      renderTransactions(type);
    }

    function showDetail(id) {
      const txn = transactionsData.find(t => t.id === id);
      if (!txn) return;
      
      const modal = document.getElementById('detailModal');
      const iconMap = { earning: 'check-circle', withdrawal: 'arrow-down', bonus: 'gift', referral: 'users' };
      
      document.getElementById('modalIcon').className = `modal-icon ${txn.type}`;
      document.getElementById('modalIcon').innerHTML = `<i class="fas fa-${iconMap[txn.type]}"></i>`;
      document.getElementById('modalTitle').textContent = txn.title;
      document.getElementById('modalDate').textContent = new Date(txn.date || txn.timestamp).toLocaleString();
      document.getElementById('modalAmount').textContent = (txn.type === 'withdrawal' ? '-' : '+') + '$' + Math.abs(parseFloat(txn.amount) || 0).toFixed(2);
      document.getElementById('modalAmount').style.color = txn.type === 'withdrawal' ? 'var(--text)' : txn.type === 'bonus' ? 'var(--warning)' : 'var(--success)';
      document.getElementById('modalStatus').textContent = (txn.status || 'completed').charAt(0).toUpperCase() + (txn.status || 'completed').slice(1);
      document.getElementById('modalId').textContent = txn.id;
      document.getElementById('modalDesc').textContent = txn.description || 'No description';
      
      modal.classList.add('active');
    }

    function closeModal(event) {
      if (!event || event.target.id === 'detailModal') {
        document.getElementById('detailModal').classList.remove('active');
      }
    }

    function exportHistory() {
      const blob = new Blob([JSON.stringify(transactionsData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `earnova-history-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
      
      Swal.fire({
        toast: true,
        position: 'top',
        title: 'Exported!',
        text: 'Transaction history downloaded',
        icon: 'success',
        timer: 2000,
        showConfirmButton: false,
        background: '#0f172a',
        color: '#f8fafc'
      });
    }

    async function clearHistory() {
      Swal.fire({
        title: 'Clear History?',
        text: 'This will delete all transaction records. This action cannot be undone.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes, Clear',
        cancelButtonText: 'Cancel',
        confirmButtonColor: '#ef4444',
        background: '#0f172a',
        color: '#f8fafc'
      }).then(async (result) => {
        if (result.isConfirmed) {
          if (currentUser) {
            try {
              const batch = db.batch();
              const snapshot = await db.collection('users').doc(currentUser.uid).collection('transactions').get();
              snapshot.docs.forEach((doc) => { batch.delete(doc.ref); });
              await batch.commit();
            } catch (error) {
              console.error('Error clearing Firebase:', error);
            }
          }
          localStorage.removeItem('transactions');
          Swal.fire({
            title: 'Cleared!',
            text: 'Transaction history has been cleared',
            icon: 'success',
            confirmButtonColor: '#6366f1',
            background: '#0f172a',
            color: '#f8fafc'
          });
        }
      });
    }

    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
